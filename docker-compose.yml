services:
  ssh-deploy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssh-deploy
    restart: unless-stopped
    ports:
      - "${SSH_LISTEN_PORT:-2222}:${SSH_LISTEN_PORT:-2222}"
    environment:
      SSH_LISTEN_HOST: "0.0.0.0"
      SSH_LISTEN_PORT: "${SSH_LISTEN_PORT:-2222}"
      SSH_AUTHORIZED_KEYS_PATH: "/app/data/authorized_keys"
      SSH_HOST_KEY_PATH: "/app/data/ssh_host_ed25519"
      DEPLOY_COMPOSE_PROJECT_DIR: "/srv/target"
      DEPLOY_COMPOSE_FILE: "${TARGET_COMPOSE_FILE:-docker-compose.yml}"
      ALLOWED_LOG_SERVICES: "${ALLOWED_LOG_SERVICES:-web,api}"
      LOGS_TAIL: "${LOGS_TAIL:-300}"
      COMMAND_TIMEOUT: "${COMMAND_TIMEOUT:-10m}"
      SSH_IDLE_TIMEOUT: "${SSH_IDLE_TIMEOUT:-2m}"
      SSH_MAX_TIMEOUT: "${SSH_MAX_TIMEOUT:-15m}"
      # Komodo API configuration (optional; if all set, overrides Compose backend)
      KOMODO_ADDRESS: "${KOMODO_ADDRESS:-}"
      KOMODO_API_KEY: "${KOMODO_API_KEY:-}"
      KOMODO_API_SECRET: "${KOMODO_API_SECRET:-}"
      KOMODO_STACK: "${KOMODO_STACK:-}"
      KOMODO_POLL_TIMEOUT: "${KOMODO_POLL_TIMEOUT:-5m}"
      KOMODO_POLL_INTERVAL: "${KOMODO_POLL_INTERVAL:-5s}"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ${TARGET_COMPOSE_PROJECT_DIR:-.}:/srv/target

  tailscale:
    image: tailscale/tailscale:stable
    container_name: tailscale-ssh-deploy
    restart: unless-stopped
    depends_on:
      - ssh-deploy
    environment:
      TS_CLIENT_ID: "${TS_OAUTH_CLIENT_ID:-}"
      TS_CLIENT_SECRET: "${TS_OAUTH_CLIENT_SECRET:-}"
      TS_HOSTNAME: "${TS_HOSTNAME:-ssh-deploy}"
      TS_STATE_DIR: "/var/lib/tailscale"
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: "${TS_EXTRA_ARGS:---accept-dns=false}"
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: "service:ssh-deploy"

volumes:
  tailscale-state:
